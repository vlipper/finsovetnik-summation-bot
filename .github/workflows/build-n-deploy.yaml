name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: image-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
          # layers caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    environment: production
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_KEY_PATH: ~/.ssh/deploy_key
      DEPLOY_PATH: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy secrets and configs
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          ssh -i "$SSH_KEY_PATH" -o BatchMode=yes \
            "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i "$SSH_KEY_PATH" -o BatchMode=yes \
            .env compose.yaml vector.yaml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Start services
        run: |
          ssh -i "$SSH_KEY_PATH" -o BatchMode=yes \
            "$SSH_USER@$SSH_HOST" 'bash -s' <<EOF
          set -eu
          cd "$DEPLOY_PATH"
          docker compose pull
          docker compose up -d
          docker image prune -f
          EOF
